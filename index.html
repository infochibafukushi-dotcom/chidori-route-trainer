    (() => {
      const imagawaStopEditor = stopEditor;
      const baseStopEditor = window.STOP_EDITOR_BEFORE_IMAGAWA;
      stopEditor = function stopEditorRouteBridge() {
        return routeState?.routeId === 'route-2' ? imagawaStopEditor() : baseStopEditor();
      };
      document.addEventListener('change', (event) => {
        if (event.target?.id !== 'sRoute') return;
        routeState.routeId = event.target.value;
        setTimeout(() => stopEditor(), 0);
      }, true);
    })();
  </script>
